<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converted Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2, h3, h4, h5, h6 {
            color: #333;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        ul {
            margin-left: 20px;
        }
        li {
            margin-bottom: 5px;
        }
        
    </style>
</head>
<body>
<h1>Test Document</h1>
<p>This is a <strong>bold</strong> word and an <em>italic</em> word and <strong><em>bold and italic</strong></em>.</p>
<h2>Second Level Header</h2>
<p>Here is a <a href="https://www.openai.com">link to OpenAI</a>.</p>
<h3>Third Level Header</h3>
<ul><li>First item</li>
<li>Second item</li>
<ul><li>Nested item</li>
<li>Another nested item</li>
</ul><li>Third item</li>
</ul>
<h4>Fourth Level Header</h4>
<p>Regular paragraph with some text.</p>
</body>
</html>
